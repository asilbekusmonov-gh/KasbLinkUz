services:
  web:
    build: .
    env_file: .env
    ports:
      - "8000:8001"
    depends_on:
      postgres_service:
        condition: service_healthy
      redis_service:
        condition: service_started

  postgres_service:
    image: postgres:alpine
    environment:
      - POSTGRES_DB=kasb_link_uz
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kasb_link_uz"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis_service:
    image: redis:alpine

volumes:
  postgres_data: