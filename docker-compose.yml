services:
  web:
    build: .
    env_file: .env
    ports:
      - "8000:8000"

  postgres_service:
    image: postgres:alpine
    environment:
      - POSTGRES_PASSWORD=1
      - POSTGRES_DB=kasb_link_uz
    ports:
      - "5432:5432"

  redis_service:
    image: redis:alpine
    ports:
      - "6379:6379"
